name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: botfarm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d botfarm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/botfarm_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import asyncio
          import os

          import asyncpg

          async def wait_for_db() -> None:
              database_url = os.environ["TEST_DATABASE_URL"].replace("+asyncpg", "")
              for _ in range(30):
                  try:
                      connection = await asyncpg.connect(database_url, timeout=2)
                      await connection.close()
                      return
                  except Exception:
                      await asyncio.sleep(1)
              raise RuntimeError("PostgreSQL service is not ready in time.")

          asyncio.run(wait_for_db())
          PY

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy app

      - name: Tests with coverage
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t botfarm-service:ci .

services:
  postgres:
    image: postgres:16-alpine
    container_name: botfarm-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: botfarm
      POSTGRES_DB: botfarm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botfarm -d botfarm"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botfarm-app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:

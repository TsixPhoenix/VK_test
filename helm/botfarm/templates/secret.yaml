apiVersion: v1
kind: Secret
metadata:
  name: {{ include "botfarm.fullname" . }}-secret
  labels:
    {{- include "botfarm.labels" . | nindent 4 }}
type: Opaque
{{ $databaseUrl := .Values.database.url }}
{{- if and (not $databaseUrl) .Values.postgres.enabled }}
{{- $postgresPassword := required "postgres.auth.password is required when postgres.enabled=true" .Values.postgres.auth.password }}
{{- $databaseUrl = printf "postgresql+asyncpg://%s:%s@%s-postgres:%v/%s" .Values.postgres.auth.username $postgresPassword (include "botfarm.fullname" .) .Values.postgres.service.port .Values.postgres.auth.database }}
{{- end }}
{{- if and (not $databaseUrl) (not .Values.postgres.enabled) }}
{{- fail "Either database.url must be set or postgres.enabled=true" }}
{{- end }}
stringData:
  DATABASE_URL: {{ $databaseUrl | quote }}
  BOTFARM_ENCRYPTION_KEY: {{ required "secrets.botfarmEncryptionKey is required" .Values.secrets.botfarmEncryptionKey | quote }}
  JWT_SECRET_KEY: {{ required "secrets.jwtSecretKey is required" .Values.secrets.jwtSecretKey | quote }}
  AUTH_PASSWORD: {{ required "secrets.authPassword is required" .Values.secrets.authPassword | quote }}
